name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:latest
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: rootpassword123
          MYSQL_DATABASE: projectdb
          MYSQL_USER: projectuser
          MYSQL_PASSWORD: projectpass123

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set Up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Dependencies
      run: npm install

    - name: Run Tests
      env:
        DB_HOST: 127.0.0.1
        DB_USER: projectuser
        DB_PASSWORD: projectpass123
        DB_NAME: projectdb
      run: npm test

  build:
    name: Build Backend
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set Up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Cache Dependencies
      uses: actions/cache@v3
      with:
        path: node_modules
        key: ${{ runner.os }}-node_modules-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node_modules

    - name: Install Dependencies
      run: npm install

    - name: Build Backend
      run: npm run build

    - name: Save Build Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: backend-build
        path: build/
