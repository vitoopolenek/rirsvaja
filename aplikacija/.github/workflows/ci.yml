name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set Up Docker
      run: |
        docker-compose -f aplikacija/backend/docker-compose.yml up -d
        echo "Waiting for MySQL to be healthy..."
        until docker exec my_mysql mysqladmin ping -h127.0.0.1 --silent; do
          echo "MySQL is not healthy yet. Retrying in 5 seconds..."
          sleep 5
        done
        echo "MySQL is healthy!"

    - name: Install Dependencies
      run: |
        cd aplikacija/backend
        npm install

    - name: Run Tests
      run: |
        cd aplikacija/backend
        npm test

    - name: Tear Down Docker
      if: always()
      run: |
        docker-compose -f aplikacija/backend/docker-compose.yml down

  build:
    name: Build Backend
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set Up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Cache Dependencies
      uses: actions/cache@v3
      with:
        path: node_modules
        key: ${{ runner.os }}-node_modules-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node_modules

    - name: Install Dependencies
      run: |
        cd aplikacija/backend
        npm install

    - name: Build Backend
      run: |
        cd aplikacija/backend
        npm run build

    - name: Save Build Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: backend-build
        path: aplikacija/backend/build/
